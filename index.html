<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getFirestore, collection, addDoc, getDocs, query, orderBy, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
  import { getStorage, ref, uploadString, getDownloadURL } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js';

  const firebaseConfig = {
    apiKey: "AIzaSyBesowYLPFM3pCK--rPs4nbDphroPKiNoc",
    authDomain: "enjoymath-planer.firebaseapp.com",
    projectId: "enjoymath-planer",
    storageBucket: "enjoymath-planer.firebasestorage.app",
    messagingSenderId: "929239886547",
    appId: "1:929239886547:web:2d6f2b4988dd4913834226"
  };

  const app = initializeApp(firebaseConfig);
  window.db = getFirestore(app);
  window.storage = getStorage(app);
  window.fsCollection = collection;
  window.fsAddDoc = addDoc;
  window.fsGetDocs = getDocs;
  window.fsQuery = query;
  window.fsOrderBy = orderBy;
  window.fsOnSnapshot = onSnapshot;
  window.stRef = ref;
  window.stUploadString = uploadString;
  window.stGetDownloadURL = getDownloadURL;
  window.firebaseReady = true;
  console.log('Firebase 연결 완료 ✅');

  // FCM 서비스워커 등록 + 토큰 발급
  const VAPID_KEY = 'BM-2F_JJxDUmOILg1IvtTWPcWaqZJgKYYkzqucFO8Foor-l9geeJR_xiCX8c0qQ_8ZkUPhTQhM0S2Qbq84kP53U';

  async function initFCM() {
    if (!('serviceWorker' in navigator)) return;
    try {
      const { getMessaging, getToken, onMessage } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging.js');
      const messaging = getMessaging(app);

      // 서비스워커 등록
      const reg = await navigator.serviceWorker.register('/firebase-messaging-sw.js');
      console.log('서비스워커 등록 완료 ✅');

      // FCM 토큰 발급
      const token = await getToken(messaging, { vapidKey: VAPID_KEY, serviceWorkerRegistration: reg });
      if (token) {
        window.fcmToken = token;
        console.log('FCM 토큰 발급 완료 ✅');
        // 토큰을 Firestore에 저장 (로그인 후 호출됨)
        window.saveFcmToken = async (userId) => {
          try {
            await fsAddDoc(fsCollection(window.db, 'fcmTokens'), {
              userId, token, updatedAt: new Date().toISOString()
            });
          } catch(e) {}
        };
      }

      // 포그라운드 메시지 처리 (앱 열려있을 때)
      onMessage(messaging, (payload) => {
        const { title, body } = payload.notification || {};
        if (title) {
          if (window.showToast) window.showToast(body || title, '🔔');
          new Notification(title, { body, tag: 'planner-reminder' });
        }
      });
    } catch(e) {
      console.log('FCM 초기화 실패:', e);
    }
  }

  // 페이지 로드 후 FCM 초기화
  window.addEventListener('load', () => setTimeout(initFCM, 2000));
</script>
<style>

<!-- ══ 로그인 ══ -->
<div class="page active" id="loginPage">
  <div class="login-hero">

    </div>

      <input class="input-field" id="phoneInput" type="tel" placeholder="010-0000-0000" maxlength="13" inputmode="numeric">
    </div>
    <button class="btn-primary" onclick="handleLogin()">시작하기 🚀</button>
    <button class="demo-btn" onclick="demoLogin()">👀 데모로 체험하기</button>
  </div>
</div>

<!-- ══ 메인 ══ -->
<div class="page" id="mainPage">

  <!-- 상단 바 -->
  <div class="top-bar">
    <div>
      <div class="greeting"><span id="userNameDisplay">이름</span>님 안녕하세요 👋</div>
      <div class="greeting-sub" id="todayStatus">오늘 아직 인증 전이에요</div>
    </div>
    <div class="top-right">
      <div class="icon-btn" onclick="toggleNotif()">🔔</div>
    </div>
  </div>

  <!-- 스크롤 바디 -->
  <div class="scroll-body">

    <!-- 스트릭 -->
    <div class="sec">🏅 현황</div>
    <div class="streak-row">
      <div class="streak-card" id="streakCard">
        <div class="streak-icon">🔥</div>
        <div>
          <div class="streak-label">연속 인증</div>
          <div class="streak-val" id="streakVal">0일</div>
        </div>
      </div>
      <div class="streak-card" id="todayCard">
        <div class="streak-icon" id="todayIcon">⏰</div>
        <div>
          <div class="streak-label">오늘</div>
          <div class="streak-val" id="todayVal" style="font-size:15px">미인증</div>
        </div>
      </div>
    </div>

    <!-- 달성률 -->
    <div class="sec">📊 이번 주 달성률</div>
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">내 달성률</div>
        <div class="stat-value purple" id="myRate">0%</div>
        <div class="stat-sub" id="myRateSub">0/7일</div>
        <div class="bar-bg"><div class="bar-fill purple" id="myBar" style="width:0%"></div></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">팀 달성률</div>
        <div class="stat-value cyan" id="teamRate">0%</div>
        <div class="stat-sub" id="teamRateSub">팀 평균</div>
        <div class="bar-bg"><div class="bar-fill cyan" id="teamBar" style="width:0%"></div></div>
      </div>
    </div>

    <!-- 팀 현황 -->
    <div class="sec">👥 우리팀 달성 상황</div>
    <div class="team-card">
      <div class="team-header" onclick="toggleTeam()">
        <div class="team-title">👥 팀 멤버</div>
        <div class="team-chevron" id="teamChevron">▼</div>
      </div>
      <div class="team-chips" id="teamChips"></div>
      <div class="team-body" id="teamBody"></div>
    </div>

    <!-- 피드 -->
    <div class="sec">📷 인증 피드</div>
    <div class="feed-list" id="feedList">
      <div class="empty">
        <span class="empty-icon">🌟</span>
        첫 번째 인증을 올려보세요!
      </div>
    </div>

    <button class="logout-btn" onclick="logout()">로그아웃</button>
  </div><!-- /scroll-body -->

  <!-- 고정 하단 인증 버튼 -->
  <div class="fab-wrap">
    <button class="fab" id="fabBtn" onclick="openUpload()">
      <span class="fab-icon" id="fabIcon">📸</span>
      <span id="fabText">플래너 인증하기</span>
    </button>
  </div>

</div><!-- /mainPage -->

<!-- ══ 업로드 모달 ══ -->
<div class="overlay" id="uploadOverlay">
  <div class="sheet">
    <div class="handle"></div>
    <div class="sheet-title">📸 오늘의 플래너 인증</div>
    <div class="upload-zone" id="uploadZone">
      <div class="uz-icon">📷</div>
      <p>사진 찍기 또는 갤러리 선택</p>
      <input type="file" id="fileInput" accept="image/*" capture="environment" onchange="previewFile(event)">
    </div>
    <img class="prev-img" id="prevImg" alt="미리보기">
    <button class="btn-submit" id="submitBtn" onclick="submitCertify()" disabled>인증 완료! ✨</button>
    <button class="btn-cancel" onclick="closeOverlay('uploadOverlay')">취소</button>
  </div>
</div>

<!-- ══ 칭찬 팝업 ══ -->
<div class="praise-overlay" id="praiseOverlay">
  <div class="confetti-wrap" id="confettiWrap"></div>
  <div class="praise-card">
    <span class="praise-emoji" id="praiseEmoji">🎉</span>
    <div class="praise-title" id="praiseTitle">완벽해요!</div>
    <div class="praise-msg" id="praiseMsg">오늘도 플래너를 작성했군요!</div>
    <button class="btn-ok" onclick="closePraise()">고마워요 😊</button>
  </div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"><span id="toastIcon">✅</span><span id="toastMsg"></span></div>

<script>
// ══ STATE ══
const KEY = 'plannerV3';
let S = { users:[], certs:[], user:null, notif:false };

const PRAISES = [
  {e:'🎉', t:'완벽해요!', m:'오늘도 플래너를 작성했군요.\n꾸준함이 최고예요!'},
  {e:'🔥', t:'불타오르네요!', m:'이 정도면 플래너 마스터!\n내일도 이 열정 그대로!'},
  {e:'⭐', t:'스타예요!', m:'작은 습관이 큰 변화를 만들어요.\n오늘 정말 잘했어요!'},
  {e:'💪', t:'최고예요!', m:'포기하지 않는 당신이 진짜 강자!\n오늘도 화이팅!'},
  {e:'🌟', t:'빛나고 있어요!', m:'매일 인증하는 습관,\n미래의 내가 감사할 거예요!'},
  {e:'🏆', t:'챔피언!', m:'오늘도 해냈어요!\n계속 달려봐요!'},
  {e:'🦋', t:'성장 중이에요!', m:'나비가 날갯짓하듯,\n당신의 습관이 빛나고 있어요!'},
  {e:'🎯', t:'목표 달성!', m:'오늘 목표 완료! 정말 대단해요.\n한 걸음씩 나아가고 있어요!'},
];
const COLORS = ['#a855f7','#ec4899','#3b82f6','#22d3ee','#f59e0b','#10b981','#ef4444','#8b5cf6'];
const DEMO = [{name:'김선생님',phone:'010-0000-0001'},{name:'이지유',phone:'010-0000-0002'},
  {name:'박서준',phone:'010-0000-0003'},{name:'최아린',phone:'010-0000-0004'},{name:'정민준',phone:'010-0000-0005'}];

function load() { try { const d=localStorage.getItem(KEY); if(d) S=JSON.parse(d); } catch(e){} }
function save() { try { localStorage.setItem(KEY,JSON.stringify(S)); } catch(e){} }

// ══ 날짜 ══
function todayKey() {
  const d=new Date();
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
}
function p(n){return String(n).padStart(2,'0');}
function last7() {
  return Array.from({length:7},(_,i)=>{
    const d=new Date(); d.setDate(d.getDate()-(6-i));
    return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
  });
}
function hasCertToday(uid){ return S.certs.some(c=>c.uid===uid&&c.date===todayKey()); }
function hasCertDay(uid,day){ return S.certs.some(c=>c.uid===uid&&c.date===day); }
function weekCerts(uid){ return last7().filter(d=>hasCertDay(uid,d)).length; }
function streak(uid){
  let s=0,d=new Date();
  while(true){
    const k=`${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
    if(hasCertDay(uid,k)){s++;d.setDate(d.getDate()-1);}else break;
  }
  return s;
}
function timeAgo(ts){
  const diff=(Date.now()-ts)/1000;
  if(diff<60) return '방금 전';
  if(diff<3600) return Math.floor(diff/60)+'분 전';
  if(diff<86400) return Math.floor(diff/3600)+'시간 전';
  return Math.floor(diff/86400)+'일 전';
}

// ══ 로그인 ══
document.getElementById('phoneInput').addEventListener('input',function(){
  let v=this.value.replace(/\D/g,'');
  if(v.length<=3) this.value=v;
  else if(v.length<=7) this.value=v.slice(0,3)+'-'+v.slice(3);
  else this.value=v.slice(0,3)+'-'+v.slice(3,7)+'-'+v.slice(7,11);
});

function handleLogin(){
  const name=document.getElementById('nameInput').value.trim();
  const phone=document.getElementById('phoneInput').value.trim();
  if(!name){toast('이름을 입력해주세요 😊','⚠️');return;}
  if(phone.length<12){toast('핸드폰 번호를 확인해주세요','⚠️');return;}
  let u=S.users.find(u=>u.name===name&&u.phone===phone);
  if(!u){ u={id:Date.now(),name,phone,ci:S.users.length%COLORS.length}; S.users.push(u); }
  S.user=u; save(); enterMain();
}

function demoLogin(){
  if(!S.users.length){
    DEMO.forEach((m,i)=>S.users.push({id:i+1,name:m.name,phone:m.phone,ci:i}));
    const days=last7();
    S.users.forEach(u=>{
      days.slice(0,Math.floor(Math.random()*5)+1).forEach(d=>{
        S.certs.push({id:Date.now()+Math.random(),uid:u.id,date:d,ts:Date.now()-Math.random()*86400000*6,photo:''});
      });
    });
  }
  S.user=S.users[0]; save(); enterMain();
}

function logout(){ S.user=null; save(); showPage('loginPage'); }

// ══ 메인 ══
function enterMain(){ showPage('mainPage'); render(); reqNotif(); startSched(); }
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function render(){
  const u=S.user;
  document.getElementById('userNameDisplay').textContent=u.name;

  const done=hasCertToday(u.id);
  const s=streak(u.id);

  // 오늘 상태
  document.getElementById('todayStatus').textContent=done?'✅ 오늘 인증 완료!':'⏰ 아직 오늘 인증 전이에요';
  document.getElementById('todayCard').className='streak-card'+(done?' today-done':'');
  document.getElementById('todayIcon').textContent=done?'✅':'⏰';
  document.getElementById('todayVal').textContent=done?'인증완료':'미인증';
  document.getElementById('todayVal').style.color=done?'var(--green)':'var(--text-muted)';

  // 스트릭
  document.getElementById('streakVal').textContent=s+'일 🔥';

  // FAB
  const fab=document.getElementById('fabBtn');
  if(done){
    fab.className='fab done';
    document.getElementById('fabIcon').textContent='✅';
    document.getElementById('fabText').textContent='오늘 인증 완료!';
    fab.onclick=()=>toast('오늘 이미 인증했어요! ✅','✨');
  } else {
    fab.className='fab';
    document.getElementById('fabIcon').textContent='📸';
    document.getElementById('fabText').textContent='플래너 인증하기';
    fab.onclick=openUpload;
  }

  // 달성률
  const myD=weekCerts(u.id);
  const myR=Math.round(myD/7*100);
  document.getElementById('myRate').textContent=myR+'%';
  document.getElementById('myRateSub').textContent=myD+'/7일';
  setTimeout(()=>document.getElementById('myBar').style.width=myR+'%',100);

  if(S.users.length){
    const tot=S.users.reduce((s,u)=>s+weekCerts(u.id),0);
    const tr=Math.round(tot/(S.users.length*7)*100);
    document.getElementById('teamRate').textContent=tr+'%';
    document.getElementById('teamRateSub').textContent='팀 전체 달성률';
    setTimeout(()=>document.getElementById('teamBar').style.width=tr+'%',150);
  }

  renderChips();
  renderFeed();
}

function renderChips(){
  const el=document.getElementById('teamChips');
  el.innerHTML=S.users.map(u=>`
    <div class="chip">
      <div class="dot ${hasCertToday(u.id)?'on':'off'}"></div>${u.name}
    </div>`).join('');
}

function toggleTeam(){
  const body=document.getElementById('teamBody');
  const chev=document.getElementById('teamChevron');
  const open=body.classList.contains('open');
  if(!open) renderTeamBody();
  body.classList.toggle('open',!open);
  chev.classList.toggle('open',!open);
}

function renderTeamBody(){
  const days=last7();
  document.getElementById('teamBody').innerHTML=S.users.map((u,i)=>{
    const wd=days.map(d=>hasCertDay(u.id,d));
    const rate=Math.round(wd.filter(Boolean).length/7*100);
    const color=COLORS[u.ci!=null?u.ci:i%COLORS.length];
    return `<div class="tm-row">
      <div class="tm-left">
        <div class="av" style="background:${color}">${u.name.slice(-1)}</div>
        <div>
          <div class="tm-name">${u.name}</div>
          <div class="tm-rate">달성률 ${rate}%</div>
        </div>
      </div>
      <div class="wdots">${wd.map(d=>`<div class="wd ${d?'on':''}"></div>`).join('')}</div>
    </div>`;
  }).join('');
}

function renderFeed(){
  const feed=document.getElementById('feedList');
  const sorted=[...S.certs].sort((a,b)=>b.ts-a.ts).slice(0,30);
  if(!sorted.length){
    feed.innerHTML='<div class="empty"><span class="empty-icon">🌟</span>첫 번째 인증을 올려보세요!</div>';
    return;
  }
  feed.innerHTML='';
  sorted.forEach(c=>{
    const u=S.users.find(u=>u.id===c.uid);
    if(!u) return;
    const color=COLORS[u.ci!=null?u.ci:0];
    const el=document.createElement('div');
    el.className='feed-item';
    el.innerHTML=`
      <div class="fi-head">
        <div class="fi-av" style="background:${color}">${u.name.slice(-1)}</div>
        <div>
          <div class="fi-name">${u.name}</div>
          <div class="fi-time">${timeAgo(c.ts)} · 플래너 인증 ✅</div>
        </div>
      </div>
      ${c.photo?`<img class="fi-img" src="${c.photo}" alt="인증사진">`:'<div class="fi-placeholder">📓</div>'}
      <div class="fi-cap">오늘도 플래너 작성 완료! 습관이 쌓이고 있어요 🔥</div>
      <div class="fi-likes">💜 ${Math.floor(Math.random()*8)+1}명이 응원해요</div>`;
    feed.appendChild(el);
  });
}

// ══ 업로드 ══
let selFile=null;
function openUpload(){
  selFile=null;
  document.getElementById('prevImg').style.display='none';
  document.getElementById('submitBtn').disabled=true;
  document.getElementById('fileInput').value='';
  openOverlay('uploadOverlay');
}
function previewFile(e){
  const f=e.target.files[0]; if(!f) return;
  selFile=f;
  const r=new FileReader();
  r.onload=ev=>{
    const img=document.getElementById('prevImg');
    img.src=ev.target.result; img.style.display='block';
    document.getElementById('submitBtn').disabled=false;
  };
  r.readAsDataURL(f);
}
function submitCertify(){
  const u=S.user;
  const cert={id:Date.now(),uid:u.id,date:todayKey(),ts:Date.now(),photo:''};
  if(selFile){
    const r=new FileReader();
    r.onload=ev=>{cert.photo=ev.target.result;finish(cert);};
    r.readAsDataURL(selFile);
  } else { finish(cert); }
}
function finish(cert){
  S.certs.push(cert); save();
  closeOverlay('uploadOverlay');
  setTimeout(()=>{render();showPraise();},300);
}

// ══ 칭찬 팝업 ══
function showPraise(){
  const p=PRAISES[Math.floor(Math.random()*PRAISES.length)];
  document.getElementById('praiseEmoji').textContent=p.e;
  document.getElementById('praiseTitle').textContent=p.t;
  document.getElementById('praiseMsg').textContent=p.m;
  document.getElementById('praiseOverlay').classList.add('open');
  confetti();
}
function closePraise(){
  document.getElementById('praiseOverlay').classList.remove('open');
  document.getElementById('confettiWrap').innerHTML='';
}
function confetti(){
  const wrap=document.getElementById('confettiWrap');
  wrap.innerHTML='';
  const cols=['#a855f7','#ec4899','#fbbf24','#22d3ee','#4ade80','#f87171'];
  for(let i=0;i<70;i++){
    const el=document.createElement('div');
    el.className='cp';
    const sz=6+Math.random()*9;
    el.style.cssText=`left:${Math.random()*100}%;width:${sz}px;height:${sz}px;
      background:${cols[Math.floor(Math.random()*cols.length)]};
      border-radius:${Math.random()>.5?'50%':'3px'};
      animation-duration:${1.5+Math.random()*2.5}s;
      animation-delay:${Math.random()*0.6}s;`;
    wrap.appendChild(el);
  }
}

// ══ 알림 ══
let schedInterval=null;
async function reqNotif(){
  if(!('Notification' in window)) return;
  if(Notification.permission==='default') {
    const p=await Notification.requestPermission();
    S.notif=p==='granted';
  } else { S.notif=Notification.permission==='granted'; }
}
function toggleNotif(){
  if(!('Notification' in window)){toast('이 브라우저는 알림 미지원','⚠️');return;}
  if(Notification.permission==='granted') toast('알림 설정됨! 밤 10시에 와요 🔔','🔔');
  else{ reqNotif(); toast('알림 권한을 허용해주세요 🙏','🔔'); }
}
function sendNotif(title,body){
  if(!S.notif||!S.user) return;
  if(Notification.permission!=='granted') return;
  try{ new Notification(title,{body,tag:'planner',renotify:true}); }catch(e){}
}
function startSched(){
  if(schedInterval) clearInterval(schedInterval);
  schedInterval=setInterval(checkTime,30000);
}
function checkTime(){
  if(!S.user||hasCertToday(S.user.id)) return;
  const now=new Date(), h=now.getHours(), m=now.getMinutes();

  // 밤 10:00 → 1번
  if(h===22&&m===0){
    const k='n22_'+todayKey();
    if(!sessionStorage.getItem(k)){ sessionStorage.setItem(k,'1');
      sendNotif('📓 엔조이수학 플래너 챌린지','오늘 플래너 인증해주세요~ ✨'); }
    return;
  }
  // 밤 11:00 → 1번
  if(h===23&&m===0){
    const k='n23_'+todayKey();
    if(!sessionStorage.getItem(k)){ sessionStorage.setItem(k,'1');
      sendNotif('📓 플래너 인증 알림','아직 인증 안 했어요! 지금 바로 해요 🔥'); }
    return;
  }
  // 23:10~23:50 → 10분마다
  if(h===23&&m>0&&m%10===0){
    const k=`n23${p(m)}_`+todayKey();
    if(!sessionStorage.getItem(k)){ sessionStorage.setItem(k,'1');
      sendNotif('📓 플래너 인증 알림','자정 전에 꼭 인증해요! 💪'); }
  }
  // 자정 이후 → 없음
}

// ══ 오버레이 ══
function openOverlay(id){ document.getElementById(id).classList.add('open'); }
function closeOverlay(id){ document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.overlay').forEach(el=>{
  el.addEventListener('click',function(e){ if(e.target===this) this.classList.remove('open'); });
});

// ══ 토스트 ══
let tt;
function toast(msg,icon='✅'){
  document.getElementById('toastMsg').textContent=msg;
  document.getElementById('toastIcon').textContent=icon;
  const el=document.getElementById('toast');
  el.classList.add('show');
  clearTimeout(tt);
  tt=setTimeout(()=>el.classList.remove('show'),3000);
}

// ══ INIT ══
load();
if(S.user) enterMain();
</script>
</body>
</html>
